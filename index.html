<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مفاجأة العيد لنونو ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #e8f5e9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
            touch-action: manipulation;
        }

        .card {
            background: white;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            border: 3px solid #ff6b81;
            position: relative;
            z-index: 10;
            animation: popIn 0.8s ease-out;
        }

        h1 {
            color: #ff4757;
            font-size: 1.6rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .question {
            color: #2ed573;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .btn {
            background-color: #ffffff;
            border: 2px solid #ffa502;
            color: #333;
            padding: 14px 15px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        .btn:active {
            background-color: #ffa502;
            color: white;
        }

        #safariBtn {
            position: relative;
            z-index: 20;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result {
            display: none;
            font-size: 1.5rem;
            color: #ff4757;
            font-weight: bold;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in;
            line-height: 1.6;
        }

        /* تأثير الخرفان الطائرة السحري */
        .sheep {
            position: absolute;
            font-size: 2.5rem; /* حجم الخروف */
            pointer-events: none;
            z-index: 1;
            animation: fly linear infinite;
            bottom: -80px;
            user-select: none;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.8);
                opacity: 0;
            }
            10% { opacity: 0.9; }
            90% { opacity: 0.9; }
            100% {
                transform: translateY(-115vh) rotate(360deg) scale(1.1);
                opacity: 0;
            }
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div style="font-size: 2.5rem; margin-bottom: 15px;">🎈❤️✨</div>
        <h1>كل سنة وأنتِ طيبة يا نونو بمناسبة عيد الأضحى! 🎉</h1>
        <p class="question">تحبي نعمل ايه في العيد ده يا نونو؟</p>
        
        <div class="options-container" id="options">
            <button class="btn" onclick="showResult(1)">1- نخرج خروجة 🚗✨</button>
            <button class="btn" id="safariBtn" onmouseover="handleSafariAction()" ontouchstart="handleSafariAction(); event.preventDefault();" onclick="handleSafariAction()">2- نسافر سفرية جامدة ✈️🌊</button>
            <button class="btn" onclick="showResult(3)">3- نقعد في البيت ونتفرج علي افلام ونانتخ 🍿🎬</button>
        </div>

        <div class="result" id="resultBox"></div>
    </div>

    <script>
        // دالة توليد الخرفان الطائرة المضمونة
        function createSheep() {
            const sheep = document.createElement('div');
            sheep.innerHTML = "🐑"; // استخدام ايموجي الخروف كعنصر طائر مضمون الظهور
            sheep.classList.add('sheep');
            sheep.style.left = Math.random() * 85 + "vw";
            
            // سرعات عشوائية
            const duration = Math.random() * 3 + 4; 
            sheep.style.animationDuration = duration + "s";
            
            document.body.appendChild(sheep);
            
            setTimeout(() => {
                sheep.remove();
            }, duration * 1000);
        }

        // إطلاق خروف كل 600 مللي ثانية
        setInterval(createSheep, 600);

        let clickCount = 0;
        const safariBtn = document.getElementById('safariBtn');

        // دالة موحدة للتعامل مع الهروب وتغيير النص معاً في نفس الوقت بدون أخطاء
        function handleSafariAction() {
            if (clickCount < 3) {
                clickCount++;

                // 1. تغيير النص أولاً بناءً على عدد الضغطات/اللمسات
                if (clickCount === 1) {
                    safariBtn.innerText = "متأكدة من الاختيار ده؟ 🤔";
                } else if (clickCount === 2) {
                    safariBtn.innerText = "مفيش فايدة برضه؟ 😤";
                } else if (clickCount === 3) {
                    safariBtn.innerText = "متأكدة آخر قرار؟ 🧐";
                }

                // 2. تفعيل الهروب الفوري للزر
                const padding = 50;
                const maxX = window.innerWidth - safariBtn.offsetWidth - padding;
                const maxY = window.innerHeight - safariBtn.offsetHeight - padding;

                const randomX = Math.floor(Math.random() * (maxX - padding + 1)) + padding;
                const randomY = Math.floor(Math.random() * (maxY - padding + 1)) + padding;
                
                safariBtn.style.position = 'fixed';
                safariBtn.style.left = Math.max(10, randomX) + 'px';
                safariBtn.style.top = Math.max(10, randomY) + 'px';

                // إذا كانت هذه هي اللمسة الثالثة، نعيد الزر لمكانه الطبيعي فوراً بعد الهروب لكي تضغطه في الرابعة
                if (clickCount === 3) {
                    setTimeout(() => {
                        safariBtn.style.position = 'relative';
                        safariBtn.style.left = '0';
                        safariBtn.style.top = '0';
                    }, 500); // يعود لمكانه بعد نصف ثانية ليصبح جاهزاً للصدمة
                }
            } else if (clickCount === 3) {
                // الضغطة الرابعة والأخيرة تظهر النتيجة
                showResult(2);
            }
        }

        function showResult(choice) {
            const options = document.getElementById('options');
            const resultBox = document.getElementById('resultBox');
            
            options.style.display = 'none';
            
            let message = "";
            if(choice === 1) {
                message = "ماشي هنصرف 💸❤️";
                resultBox.style.color = "#2ed573";
            } else if(choice === 2) {
                message = "فوقي يا موهومة! 🤫😂";
                resultBox.style.color = "#ff4757";
            } else if(choice === 3) {
                message = "جدعة هيا دي نونو اللي أعرفها 🍿🛋️❤️";
                resultBox.style.color = "#1e90ff";
            }
            
            resultBox.innerHTML = message + "<br><br>🐑 كل سنة وأنتِ منورة حياتي يا روحي 🐑";
            resultBox.style.display = 'block';
        }
    </script>
</body>
</html>
